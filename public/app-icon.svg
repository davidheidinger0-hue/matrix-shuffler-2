<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="matrixGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="400" height="400" rx="30" fill="#E1F5FE" />

  <g filter="url(#softShadow)" stroke="url(#matrixGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 60 50 H 30 V 230 H 60" />
    <path d="M 230 50 H 260 V 230 H 230" />
  </g>

  <g filter="url(#softShadow)" stroke="none">
    <rect x="70" y="65" width="18" height="90" rx="9" fill="#1976D2" />
    <rect x="70" y="165" width="18" height="50" rx="9" fill="#4FC3F7" />
    
    <rect x="115" y="90" width="18" height="60" rx="9" fill="#4FC3F7" />
    <rect x="115" y="160" width="18" height="55" rx="9" fill="#1976D2" />
    
    <rect x="160" y="65" width="18" height="120" rx="9" fill="#1976D2" />
    <rect x="160" y="195" width="18" height="20" rx="9" fill="#4FC3F7" />

    <rect x="205" y="80" width="18" height="40" rx="9" fill="#4FC3F7" />
    <rect x="205" y="130" width="18" height="85" rx="9" fill="#1976D2" />
  </g>

  <path 
    d="M 250 280 
       C 250 230, 340 230, 340 280 
       C 340 330, 250 340, 250 370 
       H 340" 
    fill="none" 
    stroke="url(#matrixGrad)" 
    stroke-width="24" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    filter="url(#softShadow)"
  />
</svg>

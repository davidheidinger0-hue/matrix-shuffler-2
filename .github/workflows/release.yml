name: 'Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      tag_name: ${{ steps.get-version.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v4
      
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: get version
        id: get-version
        run: |
          VERSION=$(node -pe "require('./package.json').version")
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT
          
      - name: create release
        id: create-release
        uses: actions/github-script@v6
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${process.env.PACKAGE_VERSION}`,
              name: `Matrix Shuffler v${process.env.PACKAGE_VERSION}`,
              body: 'Take a look at the assets to download and install this app.',
              draft: true,       
              prerelease: false  
            })
            return data.id

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev

      - name: install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: install frontend dependencies
        run: pnpm install

      - name: Build Tauri App
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Assets into Folders
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            const platform = '${{ matrix.platform }}';
            const osMap = {
              'windows-latest': 'Windows',
              'macos-latest': 'Apple',
              'ubuntu-22.04': 'Linux'
            };
            const folderName = `Matrix-Shuffler-${osMap[platform]}`;
            fs.mkdirSync(folderName, { recursive: true });

            const artifacts = ${{ steps.tauri_build.outputs.artifactPaths }};
            for (const artifact of artifacts) {
              const fileName = path.basename(artifact);
              fs.cpSync(artifact, path.join(folderName, fileName), { recursive: true });
            }

            const exeName = platform === 'windows-latest' ? 'matrix-shuffler.exe' : 'matrix-shuffler'; 
            const exePath = path.join('src-tauri', 'target', 'release', exeName);
            if (fs.existsSync(exePath)) {
              fs.cpSync(exePath, path.join(folderName, exeName));
            }

            const archiveName = platform === 'windows-latest' ? `${folderName}.zip` : `${folderName}.tar.gz`;
            
            if (platform === 'windows-latest') {
              execSync(`7z a ${archiveName} ${folderName}`);
            } else {
              execSync(`tar -czvf ${archiveName} ${folderName}`);
            }

            fs.appendFileSync(process.env.GITHUB_ENV, `ARCHIVE_PATH=${archiveName}\n`);

      - name: Upload Archive to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.create-release.outputs.tag_name }} ${{ env.ARCHIVE_PATH }}


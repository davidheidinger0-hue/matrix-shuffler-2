name: 'CI & Release'

on:
  push:
    branches: [main]
    # Added tag trigger
    tags: ['v*'] 
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build-release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    
    # GitHub Actions tokens are read-only by default
    permissions:
      contents: write 

    steps:
      - uses: actions/checkout@v6

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8

      - name: install frontend dependencies
        run: pnpm install

      - name: lint
        run: pnpm lint

      - name: type check
        run: pnpm type-check

      - name: build and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose
          tagName: v__VERSION__ 
          releaseName: 'Matrix Shuffler v__VERSION__'
          releaseBody: 'See the assets below to download and install this version.'
          # Setting to true to create a draft, can be manually published so not all commits are created
          releaseDraft: true 
          prerelease: false

      - name: Save built application and installers
        uses: actions/upload-artifact@v4
        with:
          name: matrix-shuffler-${{ matrix.platform }}
          path: |
            src-tauri/target/release/matrix-shuffler*
            src-tauri/target/release/bundle/** if-no-files-found: error
